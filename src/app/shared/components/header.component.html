<header class="header" [class.scrolled]="scrolled" [class.on-dark]="onDark">
  <div class="container nav-inner">
    <a routerLink="/" class="logo" (click)="menuOpen=false">
      <span class="logo-mark">L</span>
      <span class="logo-text">Luna<b>IT</b><i>Solutions</i></span>
    </a>

    <nav class="nav-links" [class.open]="menuOpen">
      <a routerLink="/"          routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="menuOpen=false">Inicio</a>
      <a routerLink="/servicios"  routerLinkActive="active" (click)="menuOpen=false">Soluciones</a>
      <a routerLink="/portafolio" routerLinkActive="active" (click)="menuOpen=false">Casos de Uso</a>
      <a routerLink="/contacto"   routerLinkActive="active" (click)="menuOpen=false">Contacto</a>
      <a routerLink="/contacto"   class="btn btn-primary btn-sm nav-cta" (click)="menuOpen=false">Solicitar Diagnóstico</a>
    </nav>

    <button class="hamburger" (click)="menuOpen=!menuOpen" [class.open]="menuOpen" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
